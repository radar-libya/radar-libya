<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رادار ليبيا - قطع الغيار</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: #0a1628;
            --accent: #f97316;
            --accent2: #3b82f6;
            --surface: #111827;
            --card: #1f2937;
            --border: #374151;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            position: relative;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 4px 14px;
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.15);
        }

        .search-icon {
            color: var(--text-muted);
            font-size: 1.3rem;
            margin-left: 10px;
        }

        .search-input {
            width: 100%;
            background: none;
            border: none;
            padding: 12px 6px;
            color: var(--text);
            font-size: 1.1rem;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .results-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 680px) {
            .results-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #4b5563;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .part-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .badge {
            background-color: rgba(249, 115, 22, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge.used {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent2);
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--text-muted);
            align-items: center;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text);
            font-weight: 500;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 6px;
        }

        .contact-btn {
            background-color: #25d366;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            margin-top: auto;
            transition: background-color 0.2s;
        }

        .contact-btn:hover {
            background-color: #20ba5a;
        }

        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        .error-message {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">📡 رادار ليبيا</div>
        <p>البحث الذكي عن قطع الغيار في كل المدن الليبية</p>
    </header>

    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن قطعة، سيارة، أو مدينة..." disabled />
        </div>
    </div>

    <div id="errorOverlay"></div>

    <div class="results-container" id="resultsContainer">
        <div class="status-message">
            <div class="loading-spinner"></div>
            <div>جاري تشغيل الرادار والاتصال بقاعدة البيانات...</div>
        </div>
    </div>

    <script>
        // إعدادات الاتصال بقاعدة البيانات المحدثة
        const SUPABASE_URL = 'https://gtwmawzcmhjahyekpkiu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0d21hd3pjbWhqYWh5ZWtwa2l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDczNDUzODEsImV4cCI6MjA2MjkyMTM4MX0.0Rly0vN9bYvP5w5gTz3S6R7EwS9o8D_48K5T7T6k1Xk';

        let allParts = [];

        async function fetchPartsData() {
            const resultsContainer = document.getElementById('resultsContainer');
            const errorOverlay = document.getElementById('errorOverlay');
            const searchInput = document.getElementById('searchInput');

            try {
                // جلب البيانات مع ربط جدول المحلات تلقائياً
                const response = await fetch(`${SUPABASE_URL}/rest/v1/parts?select=*,shops(*)`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error('فشل جلب البيانات من السيرفر');
                }

                allParts = await response.json();
                
                // تفعيل خانة البحث وعرض البيانات
                searchInput.disabled = false;
                displayParts(allParts);

            } catch (error) {
                console.error(error);
                errorOverlay.innerHTML = `
                    <div class="error-message">
                        عذراً، فشل الرادار في الاتصال بقاعدة البيانات. تأكد من تفعيل الصلاحيات.
                    </div>
                `;
                resultsContainer.innerHTML = '';
            }
        }

        function displayParts(parts) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            if (parts.length === 0) {
                container.innerHTML = '<div class="status-message">لم يتم العثور على قطع تطابق بحثك.</div>';
                return;
            }

            parts.forEach(part => {
                const shopName = part.shops ? part.shops.name : 'محل غير معروف';
                const conditionClass = part.condition === 'جديد' ? '' : 'used';
                const whatsappNumber = part.whatsapp || (part.shops ? part.shops.whatsapp : '');
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="part-name">${part.name}</div>
                        <span class="badge ${conditionClass}">${part.condition}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">السيارة:</span>
                        <span class="info-value">${part.brand} ${part.model}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">المحل:</span>
                        <span class="info-value">${shopName}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">المدينة:</span>
                        <span class="info-value">📍 ${part.city}</span>
                    </div>
                    <div class="price-tag">${part.price_text}</div>
                    ${whatsappNumber ? `
                        <a href="https://wa.me/${whatsappNumber}" target="_blank" class="contact-btn">
                            💬 تواصل عبر الواتساب
                        </a>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // تفعيل محرك البحث الذكي
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                displayParts(allParts);
                return;
            }

            const filtered = allParts.filter(part => {
                const shopName = part.shops ? part.shops.name.toLowerCase() : '';
                return (
                    part.name.toLowerCase().includes(query) ||
                    part.brand.toLowerCase().includes(query) ||
                    part.model.toLowerCase().includes(query) ||
                    part.city.toLowerCase().includes(query) ||
                    shopName.includes(query)
                );
            });

            displayParts(filtered);
        });

        // البدء بتشغيل الدالة عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', fetchPartsData);
    </script>
</body>
</html>
